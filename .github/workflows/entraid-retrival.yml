name: Publish Entra ID object retrieval module

on:
    workflow_dispatch:
#    pull_request:
#       branches:
#            - main
#        paths:
#            - 'EntraIDObjectRetrieve/**'
#            - 'utilities.bicep'
#            -  '.github/workflows/entraid_retrival.yml'
#    push:
