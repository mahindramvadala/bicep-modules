name: Publish Virtual Network Bicep module

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - 'VirtualNetwork/**'
            - 'utilities.bicep'
            - '.github/workflows/virtual-network.yml'
jobs:
    key-vault:
        permissions:
            contents: read
            id-token: write
        uses: ./.github/workflows/bicep-publish.yml
        with:
            azure-client-id: 4efea1b2-111b-464b-aa2f-efa403e4c7d4
            bicep-file-path: ./VirtualNetwork/module.bicep
            registry-name: mahicr
            registry-path: network/vnet:1.0
