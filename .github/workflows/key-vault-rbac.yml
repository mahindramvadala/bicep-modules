name: Publish Key Vault RBAC Bicep module

on:
    workflow_dispatch:
#    pull_request:
#        branches:
#            - main
#        paths:
#            - 'KeyVaultRBAC/*'
#            - 'utilities.bicep'
#            - '.github/workflows/key-vault-rbac.yml'
#    push:
