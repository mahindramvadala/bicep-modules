name: Publish Key Vault RBAC Bicep module

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - 'KeyVaultRBAC/*'
            - 'utilities.bicep'
            - '.github/workflows/key-vault-rbac.yml'
jobs:
    key-vault:
        permissions:
            contents: read
            id-token: write
        uses: ./.github/workflows/bicep-publish.yml
        with:
            azure-client-id: 4efea1b2-111b-464b-aa2f-efa403e4c7d4
            bicep-file-path: ./KeyVaultRBAC/module.bicep
            registry-name: mahicr
            registry-path: key-vault/rbac:1.0
