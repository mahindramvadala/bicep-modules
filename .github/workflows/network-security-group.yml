name: Publish Network Security Group Bicep module

on:
    workflow_dispatch:
    pull_request:
        branches:
            - main
        paths:
            - 'VirtualNetwork/**'
            - 'utilities.bicep'
            - '.github/workflows/virtual-network.yml'
    push:
        branches:
            - main
        paths:
            - 'NetworkSecurityGroup/**'
            - 'utilities.bicep'
            - '.github/workflows/network-security-group.yml'
jobs:
    key-vault:
        permissions:
            contents: read
            id-token: write
        uses: ./.github/workflows/bicep-publish.yml
        secrets:
            azure-client-id: ${{ secrets.ClIENT_ID }}
            azure-tenant-id: ${{ secrets.TENANT_ID }}
            azure-subscription-id: ${{ secrets.SUBSCRIPTION_ID }}
        with:
            bicep-file-path: NetworkSecurityGroup/
            registry-name: crmahi
            registry-path: network/nsg:1.0
